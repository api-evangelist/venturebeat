aid: venturebeat
name: VentureBeat
description: >-
  VentureBeat is a leading technology news and media company covering artificial
  intelligence, enterprise technology, gaming, and the business of innovation.
  Founded in 2006 and based in San Francisco, VentureBeat does not offer a public
  developer REST API but provides content access via RSS feeds and content
  licensing. Its editorial coverage spans AI, machine learning, cloud computing,
  cybersecurity, and digital transformation for business leaders and technologists.
type: Index
